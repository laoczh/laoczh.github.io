<style>
  :root, [data-theme="light"] {
    --bg: #f5f6fa;
    --bg2: #ffffff;
    --surface: #ffffff;
    --surface2: #f9fafb;
    --surface3: #f3f4f6;
    --border: #e5e7eb;
    --border2: #d1d5db;
    --text: #111827;
    --text2: #6b7280;
    --text3: #9ca3af;
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent-light: rgba(99,102,241,0.08);
    --accent-glow: rgba(99,102,241,0.15);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 28px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.04);
    --card-hover-shadow: 0 8px 24px rgba(99,102,241,0.10), 0 2px 8px rgba(0,0,0,0.06);
    --ambient1: rgba(99,102,241,0.06);
    --ambient2: rgba(59,130,246,0.05);
    --ambient3: rgba(236,72,153,0.03);
  }
  [data-theme="dark"] {
    --bg: #0c0c12;
    --bg2: #141420;
    --surface: rgba(255,255,255,0.05);
    --surface2: rgba(255,255,255,0.07);
    --surface3: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.16);
    --text: #f0f0f5;
    --text2: #9ca3b0;
    --text3: #5a5f70;
    --accent: #7c6af6;
    --accent2: #a78bfa;
    --accent-light: rgba(124,106,246,0.12);
    --accent-glow: rgba(124,106,246,0.25);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
    --card-hover-shadow: 0 8px 28px rgba(124,106,246,0.15), 0 2px 8px rgba(0,0,0,0.3);
    --ambient1: rgba(124,106,246,0.07);
    --ambient2: rgba(59,130,246,0.05);
    --ambient3: rgba(236,72,153,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background .4s, color .4s;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 10%, var(--ambient1) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 80% 20%, var(--ambient2) 0%, transparent 70%),
      radial-gradient(ellipse 400px 400px at 50% 80%, var(--ambient3) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    transition: background .4s;
  }

  .main-content {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .top-bar {
    height: 3px;
    background: linear-gradient(90deg, #6366f1 0%, #3b82f6 25%, #818cf8 50%, #ec4899 75%, #6366f1 100%);
    background-size: 200% 100%;
    animation: barShimmer 6s linear infinite;
  }
  @keyframes barShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .theme-toggle {
    position: fixed; top: 16px; right: 20px; z-index: 100;
    width: 44px; height: 44px;
    border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    box-shadow: var(--shadow);
    transition: all .25s;
    backdrop-filter: blur(10px);
  }
  .theme-toggle:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: scale(1.05); }

  .header {
    text-align: center;
    padding: 56px 20px 12px;
    position: relative; z-index: 1;
  }
  .logo { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; }
  .logo span { display: inline-block; }
  .c-G { color: #6366f1; }
  .c-O1 { color: #ec4899; }
  .c-O2 { color: #f59e0b; }
  .c-dash { color: var(--text3); }
  .c-G2 { color: #3b82f6; }
  .c-L { color: #10b981; }
  .c-E { color: #f43f5e; }
  .tagline { color: var(--text2); font-size: .95rem; }
  .stats { margin-top: 6px; font-size: .78rem; color: var(--text3); }
  .stats b { color: var(--accent); font-weight: 600; }

  /* ===== Search ===== */
  .search-section { max-width: 640px; margin: 32px auto 0; padding: 0 20px; position: relative; z-index: 1; }
  .search-bar {
    display: flex; align-items: center;
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px;
    box-shadow: var(--shadow-md); transition: all .25s;
  }
  .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-md); }
  .search-bar .icon { padding: 0 0 0 16px; font-size: 1.1rem; opacity: .45; flex-shrink: 0; }
  .search-bar input {
    flex: 1; background: none; border: none;
    padding: 16px 14px; font-size: .95rem; color: var(--text); outline: none; font-family: inherit;
  }
  .search-bar input::placeholder { color: var(--text3); }
  .search-bar button {
    background: var(--accent); border: none; margin: 5px;
    padding: 10px 24px; border-radius: 10px; cursor: pointer;
    color: #fff; font-size: .88rem; font-weight: 600;
    font-family: inherit; transition: all .2s;
    box-shadow: 0 2px 8px rgba(99,102,241,0.25);
  }
  .search-bar button:hover { filter: brightness(1.1); box-shadow: 0 4px 14px rgba(99,102,241,0.35); }

  .chips-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; flex-wrap: wrap; justify-content: center;
  }
  .chips-label {
    color: var(--text3); font-size: .72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; margin-right: 2px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text2); font-size: .8rem; font-weight: 500;
    cursor: pointer; transition: all .2s; box-shadow: var(--shadow-sm);
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 8px var(--accent-glow); }
  .chip img { width: 14px; height: 14px; border-radius: 2px; }

  /* ===== Categories — single row ===== */
  .categories {
    max-width: 1000px; margin: 36px auto 0; padding: 0 20px;
    display: flex; gap: 8px; justify-content: center; flex-wrap: nowrap;
    position: relative; z-index: 1;
  }
  .cat-btn {
    flex: 1; max-width: 100px;
    padding: 10px 0; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text2); font-size: .84rem; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all .2s;
    box-shadow: var(--shadow-sm);
    text-align: center;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--border2); color: var(--text); }
  .cat-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 2px 12px var(--accent-glow);
  }

  /* ===== Drawer ===== */
  .drawer-wrap {
    max-width: 1100px; margin: 0 auto; padding: 0 20px;
    position: relative; z-index: 1;
    overflow: hidden;
    height: 0; opacity: 0;
    transition: height .45s cubic-bezier(0.4,0,0.2,1), opacity .35s, margin .4s cubic-bezier(0.4,0,0.2,1);
  }
  .drawer-wrap.open {
    opacity: 1; margin-top: 20px;
    transition: height .5s cubic-bezier(0.16,1,0.3,1), opacity .35s .05s, margin .4s cubic-bezier(0.16,1,0.3,1);
  }
  .drawer-wrap.closing {
    opacity: 0; margin-top: 0;
    transition: height .4s cubic-bezier(0.4,0,0.8,0.2), opacity .25s, margin .35s cubic-bezier(0.4,0,0.8,0.2);
  }

  /* ===== Grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 16px;
    padding-bottom: 20px;
  }

  /* ===== Card ===== */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 22px 22px 18px;
    position: relative;
    box-shadow: var(--shadow-sm);
    animation: cardReveal .5s cubic-bezier(0.22,1,0.36,1) both;
    transition: border-color .25s, box-shadow .25s, background .25s, transform .25s;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: var(--card-hover-shadow);
    background: var(--surface2);
    transform: translateY(-3px);
  }
  @keyframes cardReveal {
    0% { opacity: 0; transform: translateY(18px) scale(0.97); filter: blur(6px); }
    60% { filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  .card.card-exit {
    animation: cardExit .3s cubic-bezier(0.4,0,1,1) both;
  }
  @keyframes cardExit {
    to { opacity: 0; transform: translateY(-10px) scale(0.97); filter: blur(4px); }
  }

  .card-top {
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; border-radius: 12px; padding: 4px;
    margin: -4px -4px 14px -4px; transition: background .15s;
    position: relative;
  }
  .card-top:hover { background: var(--surface3); }
  .card-icon {
    width: 46px; height: 46px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
    transition: transform .25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .card:hover .card-icon { transform: scale(1.08) rotate(-2deg); }
  .card-icon img { width: 26px; height: 26px; object-fit: contain; }
  .card-info { flex: 1; min-width: 0; }
  .card-info h3 { font-size: .95rem; font-weight: 600; margin-bottom: 2px; color: var(--text); }
  .card-info p { font-size: .78rem; color: var(--text2); line-height: 1.4; }

  .card-home-hint {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-size: .65rem; color: var(--accent); font-weight: 500;
    opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; white-space: nowrap;
  }
  .card-top:hover .card-home-hint { opacity: 1; transform: translateY(-50%) translateX(-2px); }

  .card-search { display: flex; gap: 8px; }
  .card-search input {
    flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 10px 14px; font-size: .84rem;
    color: var(--text); outline: none; font-family: inherit; transition: all .2s;
  }
  .card-search input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 2px var(--accent-glow); }
  .card-search input::placeholder { color: var(--text3); }
  .card-search button {
    background: var(--accent-light); color: var(--accent);
    border: 1.5px solid rgba(99,102,241,0.18); border-radius: 12px;
    padding: 0 18px; font-size: .83rem; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .card-search button:hover { background: rgba(99,102,241,0.14); }

  .card-tag {
    position: absolute; top: 16px; right: 16px;
    font-size: .62rem; font-weight: 700; padding: 3px 9px;
    border-radius: 7px; letter-spacing: .5px; text-transform: uppercase;
  }
  .tag-综合, .tag-隐私 { background: #eef2ff; color: #6366f1; }
  .tag-技术, .tag-工具 { background: #ecfdf5; color: #059669; }
  .tag-知识 { background: #fffbeb; color: #d97706; }
  .tag-视频, .tag-音乐 { background: #fdf2f8; color: #db2777; }
  .tag-图片 { background: #faf5ff; color: #9333ea; }
  .tag-AI { background: #f0fdf4; color: #16a34a; }
  .tag-新闻, .tag-资讯 { background: #eff6ff; color: #2563eb; }

  [data-theme="dark"] .tag-综合, [data-theme="dark"] .tag-隐私 { background: rgba(99,102,241,0.15); color: #a5b4fc; }
  [data-theme="dark"] .tag-技术, [data-theme="dark"] .tag-工具 { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  [data-theme="dark"] .tag-知识 { background: rgba(245,158,11,0.15); color: #fcd34d; }

engines.forEach(e => { e.icon = favicon(e.home); });

let currentEngine = engines[0];
const chipNames = ["Google","Bing","百度","DuckDuckGo","Yandex"];

const catList = ["全部","综合","技术","AI","知识","媒体","资讯"];

/* ===== Theme ===== */
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'light' ? 'dark' : 'light';
  html.dataset.theme = next;
  document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', next);
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    if (saved === 'dark') document.querySelector('.theme-toggle').textContent = '☀️';
  }
})();

/* ===== Categories ===== */
let activeCat = null;

function renderCats() {
  document.getElementById("categories").innerHTML = catList.map(c =>
    `<button class="cat-btn${c===activeCat?' active':''}" onclick="toggleCat('${c}')">${c}</button>`
  ).join("");
}

/* ===== Drawer — optimized animation ===== */
function openDrawer(cat) {
  const drawer = document.getElementById("drawer");
  renderCards(cat);
  drawer.classList.remove("closing");
  void drawer.offsetHeight;
  drawer.classList.add("open");
  const content = drawer.querySelector('.grid');
  drawer.style.height = content.scrollHeight + 'px';
}

function closeDrawer() {
  const drawer = document.getElementById("drawer");
  const cards = drawer.querySelectorAll('.card');
  cards.forEach((card, i) => {
    card.style.animationDelay = `${i * 0.02}s`;
    card.classList.add('card-exit');
  });
  drawer.style.height = drawer.scrollHeight + 'px';
  void drawer.offsetHeight;
  setTimeout(() => {
    drawer.classList.remove("open");
    drawer.classList.add("closing");
    drawer.style.height = '0px';
    setTimeout(() => {
      drawer.classList.remove("closing");
      document.getElementById("grid").innerHTML = '';
    }, 420);
  }, Math.min(cards.length * 20 + 80, 250));
}

function toggleCat(cat) {
  if (activeCat === cat) {
    activeCat = null;
    renderCats();
    closeDrawer();
  } else {
    activeCat = cat;
    renderCats();
    openDrawer(cat);
  }
}

/* ===== Chips ===== */
function renderChips() {
  document.getElementById("chips").innerHTML = chipNames.map(n => {
    const e = engines.find(x => x.name === n);
    return `<span class="chip${e===currentEngine?' active':''}" onclick="selectEngine('${e.name}')">
      <img src="${e.icon}" alt="">${e.name}
    </span>`;
  }).join("");
}

/* ===== Cards — with staggered entrance ===== */
function renderCards(cat = "全部") {
  const list = cat === "全部" ? engines : engines.filter(e => e.cat === cat);
  document.getElementById("grid").innerHTML = list.map((e, i) => {
    const idx = engines.indexOf(e);
    return `
    <div class="card" style="animation-delay:${i * 0.04}s">
      <span class="card-tag tag-${e.cat}">${e.cat}</span>
      <div class="card-top" onclick="window.open('${e.home}','_blank')">
        <div class="card-icon icon-${e.cat}"><img src="${e.icon}" alt="" onerror="this.style.display='none';this.parentElement.textContent='🔎'"></div>
        <div class="card-info">
          <h3>${e.name}</h3>
          <p>${e.desc}</p>
        </div>
        <span class="card-home-hint">访问主页 ↗</span>
      </div>
      <div class="card-search">
        <input type="text" placeholder="在 ${e.name} 搜索…" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter'){event.stopPropagation();searchCard(${idx},this.value)}">
        <button onclick="event.stopPropagation();searchCard(${idx},this.previousElementSibling.value)">搜索</button>
      </div>
    </div>`;
  }).join("");
}

function selectEngine(name) {
  currentEngine = engines.find(e => e.name === name);
  renderChips();
}

function searchCard(idx, q) {
  if (!q.trim()) return;
  const e = engines[idx];
  window.open(`${e.url}?${e.q}=${encodeURIComponent(q.trim())}${e.extra||''}`, '_blank');
}

function doMainSearch() {
  const q = document.getElementById("mainInput").value.trim();
  if (!q) return;
  window.open(`${currentEngine.url}?${currentEngine.q}=${encodeURIComponent(q)}${currentEngine.extra||''}`, '_blank');
}

document.getElementById("mainInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doMainSearch();
});

renderCats();
renderChips();
</script>
</body>
</html>
